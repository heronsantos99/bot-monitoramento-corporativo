name: News Monitoring Bot

# Triggers:
#   - Tuesday 10:30 UTC and Friday 02:30 UTC (scheduled runs)
#   - Manual run via the Actions tab (workflow_dispatch)
on:
  schedule:
    - cron: '30 10 * * 2'
    - cron: '30 2 * * 5'
  workflow_dispatch:

# Allow the workflow to commit the generated report back to the repo.
permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Configure Git
        run: |
          git config user.name "News Monitoring Bot"
          git config user.email "bot@users.noreply.github.com"

      - name: Commit and push report
        run: |
          git add reports/
          if git diff --staged --quiet; then
            echo "No new report to commit."
          else
            git commit -m "chore(report): news monitoring report $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
